# 服务端口，默认8080，配不配都行
server.port=8080

# 应用名称
spring.application.name=springboot-learn

# ========== 数据库连接配置 ==========

# JDBC 连接地址：jdbc:mysql://主机:端口/数据库名?参数
spring.datasource.url=jdbc:mysql://localhost:3306/leave_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
# 驱动类名（MySQL 8.0+ 用这个）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 用户名和密码
spring.datasource.username=root
spring.datasource.password=root

# HikariCP 连接池配置（Spring Boot 默认连接池）
# 最小空闲连接数
spring.datasource.hikari.minimum-idle=5
# 最大连接数
spring.datasource.hikari.maximum-pool-size=20
# 空闲超时（毫秒）
spring.datasource.hikari.idle-timeout=30000
# 连接最大存活时间（毫秒）
spring.datasource.hikari.max-lifetime=1800000

# ========== MyBatis-Plus 配置 ==========
# 打印 SQL 到控制台（开发调试用，生产环境关掉）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 全局下划线转驼峰（数据库 real_name → Java realName，默认就是 true）
mybatis-plus.configuration.map-underscore-to-camel-case=true

# ========== Redis 配置 ==========
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ========== SpringDoc 配置 ==========
springdoc.swagger-ui.path=/docs.html
springdoc.api-docs.path=/v3/api-docs
